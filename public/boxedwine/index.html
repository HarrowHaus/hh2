<!DOCTYPE html>
<!-- BoxedWine host (docs/08 Tier C). Engine (wasm) + the LGPL Wine environment
     (free software) are self-hosted on Cloudflare R2 (too big to commit); this
     page loads them from the R2 public base passed as ?base=... (from
     data/boxedwine-manifest.json). Ships as a READY SHELL — NO proprietary
     Windows software is hosted; you run your own 16/32-bit Windows apps in it.
     First launch fetches from R2 (immutable cache), then cached. OWNER-VERIFY:
     the BoxedWine shell config/root wiring may need tuning for the engine build
     you upload. See /CREDITS.md. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BoxedWine</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; color: #ccc; font: 13px Tahoma, sans-serif; }
    #canvas { display: block; width: 100%; height: 100%; background: #000; }
    #msg { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <canvas id="canvas" tabindex="-1"></canvas>
  <div id="msg">Loading BoxedWine from R2…</div>
  <script>
    var base = (new URLSearchParams(location.search).get('base') || '.').replace(/\/$/, '');
    var msg = document.getElementById('msg');
    // BoxedWine's shell reads these globals to locate the engine + root FS.
    window.BOXEDWINE_BASE = base;
    var Module = {
      canvas: document.getElementById('canvas'),
      locateFile: function (p) { return base + '/' + p; },
      setStatus: function (s) { if (msg) msg.textContent = s || ''; if (!s) msg.style.display = 'none'; },
      printErr: function (m) { try { console.error(m); } catch (e) {} },
    };
    var s = document.createElement('script');
    s.src = base + '/boxedwine-shell.js';
    s.onerror = function () { if (msg) msg.textContent = 'Failed to load BoxedWine from R2. Is the asset host configured?'; };
    document.body.appendChild(s);
  </script>
</body>
</html>
